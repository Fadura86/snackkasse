<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#ff5a3c">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Snackkasse">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Snackkasse</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,900&family=Bricolage+Grotesque:wght@400;600;800&display=swap');

  :root{
    --bg:#fff6ee;
    --ink:#241a14;
    --accent:#ff5a3c;
    --accent-2:#ffb627;
    --green:#1f9e6b;
    --green-soft:#e3f5ec;
    --red:#d6435b;
    --card:#ffffff;
    --line:#eaddd0;
    --shadow:0 8px 28px rgba(90,40,20,.12);
    --shadow-lg:0 18px 50px rgba(90,40,20,.22);
    --r:22px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);
    font-family:'Bricolage Grotesque',system-ui,sans-serif;overscroll-behavior:none}
  body{
    background-image:radial-gradient(circle at 12% 8%,rgba(255,182,39,.22),transparent 40%),
                     radial-gradient(circle at 88% 0%,rgba(255,90,60,.16),transparent 38%);
    min-height:100dvh;padding-bottom:env(safe-area-inset-bottom);
  }
  h1,h2,h3{font-family:'Fraunces',serif;margin:0;letter-spacing:-.02em}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  .wrap{max-width:560px;margin:0 auto;padding:18px 16px 110px}

  /* Header */
  header{display:flex;align-items:center;justify-content:space-between;padding:8px 4px 18px}
  .brand{display:flex;align-items:center;gap:10px}
  .brand .logo{width:42px;height:42px;border-radius:14px;background:var(--accent);
    display:grid;place-items:center;font-size:24px;box-shadow:var(--shadow);transform:rotate(-6deg)}
  .brand h1{font-size:26px;font-weight:900}
  .gear{width:44px;height:44px;border-radius:14px;background:var(--card);
    display:grid;place-items:center;font-size:20px;box-shadow:var(--shadow);border:1px solid var(--line)}

  /* Snack grid */
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .snack{background:var(--card);border-radius:var(--r);padding:16px;text-align:left;
    box-shadow:var(--shadow);border:1px solid var(--line);position:relative;
    transition:transform .12s ease,box-shadow .12s ease;overflow:hidden}
  .snack:active{transform:scale(.96)}
  .snack .emoji{font-size:46px;line-height:1;display:block;margin-bottom:8px}
  .snack .name{font-weight:800;font-size:17px;line-height:1.15;margin-bottom:2px}
  .snack .price{font-family:'Fraunces',serif;font-weight:900;font-size:22px;color:var(--accent)}
  .snack .stock{position:absolute;top:12px;right:12px;font-size:12px;font-weight:700;
    background:var(--green-soft);color:var(--green);padding:3px 9px;border-radius:999px}
  .snack.out{opacity:.5;filter:grayscale(.6)}
  .snack.out .stock{background:#fde8ec;color:var(--red)}
  .snack.out:active{transform:none}

  .empty{grid-column:1/-1;text-align:center;padding:60px 20px;color:#9b8a7c}
  .empty .big{font-size:54px;margin-bottom:10px}

  /* Floating dashboard pill */
  .fab{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(18px + env(safe-area-inset-bottom));
    background:var(--ink);color:#fff;border-radius:999px;padding:14px 22px;display:flex;gap:18px;
    align-items:center;box-shadow:var(--shadow-lg);z-index:30}
  .fab .stat{display:flex;flex-direction:column;line-height:1.05}
  .fab .stat b{font-family:'Fraunces',serif;font-size:18px}
  .fab .stat span{font-size:11px;opacity:.7;font-weight:600}
  .fab .sep{width:1px;height:26px;background:rgba(255,255,255,.2)}

  /* Modal */
  .scrim{position:fixed;inset:0;background:rgba(40,20,10,.5);backdrop-filter:blur(4px);
    display:none;align-items:flex-end;justify-content:center;z-index:50}
  .scrim.show{display:flex;animation:fade .2s ease}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  .sheet{background:var(--bg);width:100%;max-width:560px;border-radius:28px 28px 0 0;
    padding:24px 20px calc(28px + env(safe-area-inset-bottom));box-shadow:var(--shadow-lg);
    animation:rise .26s cubic-bezier(.2,.9,.3,1)}
  @keyframes rise{from{transform:translateY(100%)}to{transform:translateY(0)}}
  .grab{width:42px;height:5px;border-radius:999px;background:var(--line);margin:0 auto 18px}

  /* Buy sheet */
  .buy-head{text-align:center;margin-bottom:6px}
  .buy-head .e{font-size:64px;line-height:1}
  .buy-head h2{font-size:24px;margin-top:6px}
  .buy-amount{text-align:center;font-family:'Fraunces',serif;font-weight:900;font-size:44px;
    color:var(--accent);margin:4px 0 16px}
  .qrbox{background:#fff;border-radius:20px;padding:18px;display:grid;place-items:center;
    box-shadow:var(--shadow);border:1px solid var(--line);margin-bottom:6px}
  .qrbox img,.qrbox canvas{width:200px;height:200px}
  .qrhint{text-align:center;font-size:13px;color:#9b8a7c;margin:8px 0 18px;line-height:1.4}
  .qrhint a{color:var(--accent);font-weight:700;text-decoration:none}
  .row{display:flex;gap:12px}
  .btn{flex:1;border-radius:16px;padding:16px;font-weight:800;font-size:16px;text-align:center;
    transition:transform .1s}
  .btn:active{transform:scale(.97)}
  .btn-primary{background:var(--green);color:#fff;box-shadow:var(--shadow)}
  .btn-ghost{background:var(--card);border:1px solid var(--line)}
  .btn-accent{background:var(--accent);color:#fff;box-shadow:var(--shadow)}
  .btn-block{width:100%;margin-top:10px}
  .warn{background:#fff6e0;border:1px solid #f0d98a;color:#8a6a12;border-radius:14px;
    padding:12px 14px;font-size:13px;margin-bottom:16px;line-height:1.4}

  /* Admin */
  .admin h2{font-size:24px;margin-bottom:4px}
  .admin .sub{color:#9b8a7c;font-size:14px;margin-bottom:18px}
  .field{margin-bottom:14px}
  .field label{display:block;font-weight:700;font-size:13px;margin-bottom:6px}
  .field input,.field select{width:100%;border:1px solid var(--line);background:#fff;
    border-radius:14px;padding:14px;font-size:16px;font-family:inherit;color:var(--ink)}
  .field .hint{font-size:12px;color:#9b8a7c;margin-top:5px}
  .emoji-pick{display:flex;flex-wrap:wrap;gap:8px;margin-top:4px}
  .emoji-pick button{width:46px;height:46px;border-radius:12px;background:#fff;border:1px solid var(--line);
    font-size:24px;display:grid;place-items:center}
  .emoji-pick button.sel{border-color:var(--accent);background:#fff0ec;transform:scale(1.05)}
  .price-preview{background:var(--green-soft);color:var(--green);border-radius:12px;
    padding:10px 14px;font-weight:700;font-size:14px;margin-top:6px;display:none}
  .price-preview.show{display:block}

  .alist{margin-top:8px}
  .arow{display:flex;align-items:center;gap:12px;background:#fff;border:1px solid var(--line);
    border-radius:16px;padding:12px;margin-bottom:10px}
  .arow .ae{font-size:30px}
  .arow .ai{flex:1;min-width:0}
  .arow .ai b{display:block;font-size:15px}
  .arow .ai small{color:#9b8a7c;font-size:12px}
  .arow .stockctl{display:flex;align-items:center;gap:8px}
  .arow .stockctl button{width:34px;height:34px;border-radius:10px;background:var(--bg);
    border:1px solid var(--line);font-size:20px;font-weight:800;display:grid;place-items:center}
  .arow .stockctl b{min-width:24px;text-align:center;font-size:16px}
  .arow .del{color:var(--red);font-size:20px;padding:6px}

  /* Dashboard cards */
  .dash{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
  .dcard{background:#fff;border:1px solid var(--line);border-radius:18px;padding:16px}
  .dcard span{font-size:12px;font-weight:700;color:#9b8a7c}
  .dcard b{display:block;font-family:'Fraunces',serif;font-size:26px;margin-top:4px}
  .dcard.full{grid-column:1/-1}
  .dcard.pos b{color:var(--green)} .dcard.neg b{color:var(--red)}

  .tabs{display:flex;gap:8px;background:#fff;border:1px solid var(--line);border-radius:16px;
    padding:5px;margin-bottom:18px}
  .tabs button{flex:1;padding:11px;border-radius:11px;font-weight:800;font-size:14px;color:#9b8a7c}
  .tabs button.active{background:var(--accent);color:#fff}

  .pinpad{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:18px}
  .pinpad button{background:#fff;border:1px solid var(--line);border-radius:16px;padding:18px;
    font-size:24px;font-weight:800;font-family:'Fraunces',serif}
  .pindots{display:flex;gap:14px;justify-content:center;margin:18px 0}
  .pindots i{width:16px;height:16px;border-radius:999px;background:var(--line)}
  .pindots i.on{background:var(--accent)}

  .toast{position:fixed;left:50%;bottom:90px;transform:translateX(-50%) translateY(20px);
    background:var(--green);color:#fff;padding:14px 24px;border-radius:999px;font-weight:800;
    box-shadow:var(--shadow-lg);opacity:0;transition:.3s;z-index:80;pointer-events:none}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .link{color:var(--accent);font-weight:700;background:none;text-decoration:underline;font-size:14px}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">
      <div class="logo">🍫</div>
      <h1>Snackkasse</h1>
    </div>
    <button class="gear" onclick="openAdmin()">⚙️</button>
  </header>
  <div id="grid" class="grid"></div>
</div>

<div class="fab" onclick="openAdmin('dash')">
  <div class="stat"><b id="fabIn">0,00 €</b><span>Eingenommen</span></div>
  <div class="sep"></div>
  <div class="stat"><b id="fabBal">0,00 €</b><span>Saldo</span></div>
</div>

<!-- BUY SHEET -->
<div class="scrim" id="buyScrim">
  <div class="sheet" id="buySheet"></div>
</div>

<!-- ADMIN SHEET -->
<div class="scrim" id="adminScrim">
  <div class="sheet admin" id="adminSheet"></div>
</div>

<div class="toast" id="toast"></div>

<script src="qrcode.min.js"></script>
<script>
/* ---------- Storage ---------- */
const DB_KEY='snackkasse_v1';
const DEFAULT={
  paypal:'',           // PayPal.Me Benutzername (ohne paypal.me/)
  pin:'1234',
  items:[],            // {id,name,emoji,cost,price,stock,sold}
  expenses:0           // Summe deiner Einkäufe (€)
};
let db=load();
function load(){try{return Object.assign({},DEFAULT,JSON.parse(localStorage.getItem(DB_KEY))||{})}catch(e){return Object.assign({},DEFAULT)}}
function save(){localStorage.setItem(DB_KEY,JSON.stringify(db));render()}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6)}

/* ---------- Helpers ---------- */
const eur=n=>n.toLocaleString('de-DE',{minimumFractionDigits:2,maximumFractionDigits:2})+' €';
// Aufrundung auf nächste 10 Cent
const roundUp10=c=>Math.ceil((c*100)/10)*10/100;
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1800)}

/* ---------- Totals ---------- */
function totals(){
  let income=0,stockValue=0;
  db.items.forEach(i=>{income+=i.sold*i.price;stockValue+=i.stock*i.cost});
  return {income, expenses:db.expenses, balance:income-db.expenses, stockValue};
}

/* ---------- Render main grid ---------- */
function render(){
  const t=totals();
  document.getElementById('fabIn').textContent=eur(t.income);
  const bal=document.getElementById('fabBal');
  bal.textContent=eur(t.balance);
  const grid=document.getElementById('grid');
  if(!db.items.length){
    grid.innerHTML=`<div class="empty"><div class="big">🍪</div>
      <b>Noch keine Snacks</b><br><br>
      <button class="link" onclick="openAdmin()">Jetzt ersten Snack anlegen →</button></div>`;
    return;
  }
  grid.innerHTML=db.items.map(i=>{
    const out=i.stock<=0;
    return `<button class="snack ${out?'out':''}" ${out?'':`onclick="openBuy('${i.id}')"`}>
      <span class="stock">${out?'leer':i.stock+'×'}</span>
      <span class="emoji">${i.emoji}</span>
      <span class="name">${esc(i.name)}</span>
      <span class="price">${eur(i.price)}</span>
    </button>`;
  }).join('');
}
function esc(s){return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}

/* ---------- Buy flow ---------- */
let buyId=null;
function openBuy(id){
  buyId=id;
  const i=db.items.find(x=>x.id===id); if(!i)return;
  const sheet=document.getElementById('buySheet');
  const hasPaypal=!!db.paypal.trim();
  const amt=i.price.toFixed(2);
  const link=hasPaypal?`https://www.paypal.com/paypalme/${encodeURIComponent(db.paypal.trim())}/${amt}EUR`:'';
  sheet.innerHTML=`
    <div class="grab"></div>
    <div class="buy-head"><div class="e">${i.emoji}</div><h2>${esc(i.name)}</h2></div>
    <div class="buy-amount">${eur(i.price)}</div>
    ${hasPaypal?`
      <div class="qrbox"><div id="qr"></div></div>
      <div class="qrhint">Mit der Handy-Kamera scannen zum Bezahlen<br>
        oder <a href="${link}" target="_blank" rel="noopener">PayPal öffnen</a></div>
    `:`
      <div class="warn">⚠️ Noch kein PayPal-Name hinterlegt. Geh in ⚙️ Einstellungen und trag deinen PayPal.Me-Namen ein, dann erscheint hier der QR-Code mit Betrag.</div>
    `}
    <div class="row">
      <button class="btn btn-ghost" onclick="closeBuy()">Abbrechen</button>
      <button class="btn btn-primary" onclick="confirmBuy()">✓ Bezahlt &amp; genommen</button>
    </div>`;
  document.getElementById('buyScrim').classList.add('show');
  if(hasPaypal){
    new QRCode(document.getElementById('qr'),{text:link,width:200,height:200,
      colorDark:'#241a14',colorLight:'#ffffff',correctLevel:QRCode.CorrectLevel.M});
  }
}
function confirmBuy(){
  const i=db.items.find(x=>x.id===buyId); if(!i)return;
  if(i.stock<=0){toast('Leider ausverkauft');return}
  i.stock--; i.sold=(i.sold||0)+1;
  closeBuy(); save(); toast('Danke! 🎉');
}
function closeBuy(){document.getElementById('buyScrim').classList.remove('show');buyId=null}

/* ---------- Admin (PIN-gated) ---------- */
let adminTab='items', pinBuf='';
function openAdmin(tab){
  adminTab=tab||'items';
  renderPin();
  document.getElementById('adminScrim').classList.add('show');
}
function closeAdmin(){document.getElementById('adminScrim').classList.remove('show');pinBuf=''}

function renderPin(){
  pinBuf='';
  const s=document.getElementById('adminSheet');
  s.innerHTML=`<div class="grab"></div>
    <h2 style="text-align:center">🔒 Admin</h2>
    <p class="sub" style="text-align:center">PIN eingeben (Standard 1234)</p>
    <div class="pindots" id="dots">${'<i></i>'.repeat(4)}</div>
    <div class="pinpad">
      ${[1,2,3,4,5,6,7,8,9].map(n=>`<button onclick="pinTap('${n}')">${n}</button>`).join('')}
      <button onclick="closeAdmin()" style="color:var(--red);font-size:15px">Schließen</button>
      <button onclick="pinTap('0')">0</button>
      <button onclick="pinDel()">⌫</button>
    </div>`;
}
function pinTap(n){
  if(pinBuf.length>=4)return;
  pinBuf+=n; updateDots();
  if(pinBuf.length===4){
    if(pinBuf===String(db.pin)){renderAdmin()}
    else{toast('Falscher PIN');setTimeout(renderPin,300)}
  }
}
function pinDel(){pinBuf=pinBuf.slice(0,-1);updateDots()}
function updateDots(){const d=document.getElementById('dots');if(d)[...d.children].forEach((el,i)=>el.classList.toggle('on',i<pinBuf.length))}

function renderAdmin(){
  const s=document.getElementById('adminSheet');
  s.innerHTML=`<div class="grab"></div>
    <div class="tabs">
      <button class="${adminTab==='items'?'active':''}" onclick="adminTab='items';renderAdmin()">Snacks</button>
      <button class="${adminTab==='dash'?'active':''}" onclick="adminTab='dash';renderAdmin()">Kasse</button>
      <button class="${adminTab==='set'?'active':''}" onclick="adminTab='set';renderAdmin()">Einstellungen</button>
    </div>
    <div id="adminBody"></div>`;
  if(adminTab==='items')renderItemsTab();
  if(adminTab==='dash')renderDashTab();
  if(adminTab==='set')renderSetTab();
}

/* --- Items tab --- */
const EMOJIS=['🍫','🍪','🍬','🍭','🍩','🥨','🍿','🧃','🥤','☕','🍺','🫖','🍎','🍌','🥜','🧀','🍕','🌮','🍜','🍰'];
function renderItemsTab(){
  const body=document.getElementById('adminBody');
  body.innerHTML=`
    <h2 style="font-size:20px;margin-bottom:10px">Neuer Snack</h2>
    <div class="field"><label>Name</label><input id="nName" placeholder="z. B. Snickers"></div>
    <div class="field"><label>Symbol</label>
      <div class="emoji-pick" id="emojiPick">${EMOJIS.map((e,i)=>`<button class="${i===0?'sel':''}" onclick="pickEmoji(this,'${e}')">${e}</button>`).join('')}</div>
    </div>
    <div class="field"><label>Einkaufspreis pro Stück (€)</label>
      <input id="nCost" type="number" inputmode="decimal" step="0.01" placeholder="0,65" oninput="previewPrice()">
      <div class="hint">Wird automatisch auf die nächsten 10 Cent aufgerundet = Verkaufspreis.</div>
      <div class="price-preview" id="pricePrev"></div>
    </div>
    <div class="field"><label>Anfangsbestand (Stück)</label>
      <input id="nStock" type="number" inputmode="numeric" step="1" placeholder="10"></div>
    <button class="btn btn-accent btn-block" onclick="addItem()">+ Snack hinzufügen</button>

    <h2 style="font-size:20px;margin:24px 0 10px">Sortiment &amp; Bestand</h2>
    <div class="alist" id="alist"></div>`;
  selEmoji=EMOJIS[0];
  renderAlist();
}
let selEmoji=EMOJIS[0];
function pickEmoji(btn,e){selEmoji=e;[...document.getElementById('emojiPick').children].forEach(b=>b.classList.remove('sel'));btn.classList.add('sel')}
function previewPrice(){
  const c=parseFloat((document.getElementById('nCost').value||'').replace(',','.'));
  const p=document.getElementById('pricePrev');
  if(c>0){p.textContent=`→ Verkaufspreis: ${eur(roundUp10(c))}`;p.classList.add('show')}
  else p.classList.remove('show');
}
function addItem(){
  const name=document.getElementById('nName').value.trim();
  const cost=parseFloat((document.getElementById('nCost').value||'').replace(',','.'));
  const stock=parseInt(document.getElementById('nStock').value||'0',10);
  if(!name){toast('Name fehlt');return}
  if(!(cost>0)){toast('Einkaufspreis fehlt');return}
  const price=roundUp10(cost);
  db.items.push({id:uid(),name,emoji:selEmoji,cost,price,stock:stock||0,sold:0});
  db.expenses+=cost*(stock||0); // Anfangsbestand zählt als Ausgabe
  save();renderItemsTab();toast('Snack angelegt ✓');
}
function renderAlist(){
  const l=document.getElementById('alist');
  if(!db.items.length){l.innerHTML='<p class="sub">Noch nichts angelegt.</p>';return}
  l.innerHTML=db.items.map(i=>`
    <div class="arow">
      <span class="ae">${i.emoji}</span>
      <div class="ai"><b>${esc(i.name)}</b>
        <small>EK ${eur(i.cost)} · VK ${eur(i.price)} · verkauft ${i.sold||0}×</small></div>
      <div class="stockctl">
        <button onclick="restock('${i.id}',-1)">−</button>
        <b>${i.stock}</b>
        <button onclick="restock('${i.id}',1)">+</button>
      </div>
      <button class="del" onclick="delItem('${i.id}')">🗑</button>
    </div>`).join('');
}
function restock(id,d){
  const i=db.items.find(x=>x.id===id);if(!i)return;
  if(d>0){i.stock++;db.expenses+=i.cost;}        // Nachkauf = Ausgabe
  else{if(i.stock>0){i.stock--;db.expenses-=i.cost;}} // Korrektur zurück
  save();renderAlist();
}
function delItem(id){
  if(!confirm('Diesen Snack wirklich löschen?'))return;
  db.items=db.items.filter(x=>x.id!==id);save();renderItemsTab();
}

/* --- Dashboard tab --- */
function renderDashTab(){
  const t=totals();
  const body=document.getElementById('adminBody');
  const cls=t.balance>=0?'pos':'neg';
  body.innerHTML=`
    <div class="dash">
      <div class="dcard"><span>EINGENOMMEN (Soll)</span><b style="color:var(--green)">${eur(t.income)}</b></div>
      <div class="dcard"><span>AUSGEGEBEN</span><b style="color:var(--red)">${eur(t.expenses)}</b></div>
      <div class="dcard full ${cls}"><span>SALDO</span><b>${eur(t.balance)}</b></div>
      <div class="dcard full"><span>WARENWERT IM BESTAND (EK)</span><b>${eur(t.stockValue)}</b></div>
    </div>
    <div class="warn">ℹ️ „Eingenommen" ist die Soll-Summe aller getätigten Käufe. Ob das Geld wirklich auf deinem PayPal-Konto ist, prüfst du dort – die App kann das nicht sehen.</div>
    <button class="btn btn-ghost btn-block" onclick="exportCSV()">📊 Verkäufe als CSV exportieren</button>
    <button class="btn btn-ghost btn-block" onclick="resetSales()" style="color:var(--red);margin-top:10px">↺ Verkaufszähler zurücksetzen</button>`;
}
function exportCSV(){
  let csv='Snack;EK;VK;Verkauft;Umsatz\n';
  db.items.forEach(i=>{csv+=`${i.name};${i.cost.toFixed(2)};${i.price.toFixed(2)};${i.sold||0};${(i.sold*i.price).toFixed(2)}\n`});
  const t=totals();
  csv+=`\nEingenommen;;;;${t.income.toFixed(2)}\nAusgegeben;;;;${t.expenses.toFixed(2)}\nSaldo;;;;${t.balance.toFixed(2)}\n`;
  const blob=new Blob([csv],{type:'text/csv'});const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);a.download='snackkasse.csv';a.click();
}
function resetSales(){
  if(!confirm('Alle Verkaufszähler auf 0 setzen? (Bestand & Ausgaben bleiben)'))return;
  db.items.forEach(i=>i.sold=0);save();renderDashTab();toast('Zurückgesetzt');
}

/* --- Settings tab --- */
function renderSetTab(){
  const body=document.getElementById('adminBody');
  body.innerHTML=`
    <div class="field"><label>PayPal.Me Benutzername</label>
      <input id="sPaypal" value="${esc(db.paypal)}" placeholder="z. B. MaxMuster">
      <div class="hint">Nur der Name – die App baut daraus paypal.me/Name/Betrag automatisch.</div>
    </div>
    <div class="field"><label>Admin-PIN</label>
      <input id="sPin" value="${esc(String(db.pin))}" inputmode="numeric" maxlength="4">
      <div class="hint">4-stellig. Schützt diesen Bereich.</div>
    </div>
    <div class="field"><label>Ausgaben gesamt (€) – manuell korrigierbar</label>
      <input id="sExp" type="number" step="0.01" value="${db.expenses.toFixed(2)}">
      <div class="hint">Wird beim Anlegen/Nachfüllen automatisch hochgezählt. Hier kannst du korrigieren.</div>
    </div>
    <button class="btn btn-accent btn-block" onclick="saveSet()">Speichern</button>
    <button class="btn btn-ghost btn-block" onclick="wipe()" style="color:var(--red);margin-top:10px">⚠️ Alle Daten löschen</button>`;
}
function saveSet(){
  db.paypal=document.getElementById('sPaypal').value.trim();
  const pin=document.getElementById('sPin').value.trim();
  if(/^\d{4}$/.test(pin))db.pin=pin; else{toast('PIN muss 4 Ziffern haben');return}
  const exp=parseFloat((document.getElementById('sExp').value||'0').replace(',','.'));
  if(!isNaN(exp))db.expenses=exp;
  save();toast('Gespeichert ✓');
}
function wipe(){
  if(!confirm('Wirklich ALLE Daten löschen? Das kann nicht rückgängig gemacht werden.'))return;
  localStorage.removeItem(DB_KEY);db=load();closeAdmin();render();toast('Alles gelöscht');
}

/* close sheets on scrim tap */
document.getElementById('buyScrim').addEventListener('click',e=>{if(e.target.id==='buyScrim')closeBuy()});
document.getElementById('adminScrim').addEventListener('click',e=>{if(e.target.id==='adminScrim')closeAdmin()});

/* Service worker for offline/PWA */
if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{})}

render();
</script>
</body>
</html>
